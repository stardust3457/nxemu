<html window-frame="solid-with-shadow" window-icon="window-icon.png">
  <head>
    <link href="base.css" rel="stylesheet" type="text/css" />
    <link href="config.css" rel="stylesheet" type="text/css" />
    <title>NxEmu Configuration</title>
<style>
  #MainTabNav {
    width: 12em;
    height: 100%%;
    border: 1px solid #54575b;
    border-radius: 0.5em;
    background-color: var(--color-config-page);
    margin: 0 0.4em 0 0;
    color: #ffffff;
    font-size: 0.9em;
  }

  #MainTabNav > Page:first-child
  {
    border-radius: 0.5em 0.5em 0 0;
  }

  #MainTabNav > Page
  {
    padding: 0.2em 0.5em;
  }

  #MainTabNav > Page:visited
  {
    background: #b3d9f7;
    color: #303030;
  }

  .checkbox-row,
  .slider-row
  {
    margin: 0 0 1em 0;
  }

  .inputtext-row
  {
    margin: 0 0 0.5em 0;
  }

  .form-row .left,
  .form-row .right
  {
    width: 50%%;
    display: inline-block;
  }

PageNav.page_tabs {
  display: flex;
}

PageNav.page_tabs page {
  background: #2b2f32;
  border: 1px solid #55575a;
  border-bottom: 1px solid var(--color-config-page-border);
  border-radius: 2px 2px 0 0;
  color: #eff0f1;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 1rem;
  padding: 0.2rem 1.3rem 0.2rem 1.3rem;
  margin: 0;
  position: relative;
  z-index: 2; 
  margin-bottom: -1px;
  min-width: 2rem;
  display: inline-block;
  width: max-content;
}

PageNav.page_tabs page:hover {
  border: 1px solid #55575a;
  border-bottom: 1px solid var(--color-config-page-border);
}

PageNav.page_tabs page:visited {
  background: var(--color-config-page);
  border-color: var(--color-config-page-border);
  border-bottom: 1px solid var(--color-config-page);
}

PageNav.page_tabs page.active {
  background: var(--color-config-page);
  border-color: var(--color-config-page-border);
  border-bottom: 1px solid var(--color-config-page);
}

.page_content
{
  background: var(--color-config-page);
  border: 1px solid var(--color-config-page-border);
  width: 100%%;
  height: 100%%;
  flow: horizontal;
  padding: 1em 1em 0 1em;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 0.9rem;
  color: #eff0f1;
}
</style>
  </head>
  <header>
    <window-caption role=window-caption><img src="window-icon-32.png" /><span>NxEmu Configuration</span></window-caption>
    <window-buttons>
      <window-button role="window-close"></window-button>
    </window-buttons>
  </header>
<body>
  <div class="ConfigPage" tooltip-host>
    <PageNav target="ConfigContents" id="MainTabNav">
      <Page contents="system_config_general.html" label="General" Name="General" />
      <Page contents="system_config_system.html" label="System" Name="System" />
      <Page contents="system_config_graphics.html" label="Graphics" Name="Graphics" />
      <Page contents="system_config_audio.html" label="Audio" Name="Audio" />
    </PageNav>
    <div id="ConfigContents" />
  </div>
  <div class="footer">
    <button role="window-ok">OK</button>
    <button role="window-close">Cancel</button>
  </div>
</body>
</html>
