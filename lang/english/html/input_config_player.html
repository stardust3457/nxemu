<div class="controller-config">
  <div class="config-header">
    <div class="group" style="min-width: 9rem; margin-right: 0.4rem;">
      <div class="connect">
        <input type="checkbox" id="connect-controller">
        <label for="connect-controller">Connect Controller</label>
      </div>
      <ComboBox id="comboControllerType" />
    </div>
    <div class="group" style="min-width: 14rem; margin-right: 0.4rem;">
      <div class="group-title">Input Device</div>
      <ComboBox id="comboDevices" />
    </div>
    <div class="group" style="width: 100%%">
      <div class="group-title">Profile</div>
      <select id="profile" style="width: 100%%">
        <option value="">Select Profile</option>
        <option value="default">Default</option>
        <option value="custom1">Custom 1</option>
        <option value="custom2">Custom 2</option>
      </select>
	  <button id="profile-save-btn">Save</button>
	  <button id="profile-new-btn">New</button>
	  <button id="profile-delete-btn">Delete</button>
    </div>
  </div>
  <div class="controller-body">
    <div class="config-left">
      <div class="input-group">
        <div class="group-title">Left Stick</div>

        <div class="input-grid-directional">
          <div class="input-row"><span>Up</span><button id="ButtonLStickUp">W</button></div>
          <div class="input-row"><span>Left</span><button id="ButtonLStickLeft">A</button></div>            
          <div class="input-row"><span>Right</span><button id="ButtonLStickRight">D</button></div>
          <div class="input-row"><span>Down</span><button id="ButtonLStickDown">S</button></div>
          <div class="input-row"><span>Pressed</span><button id="ButtonLStick">F</button></div>
          <div class="input-row"><span>Modifier</span><button id="ButtonLStickMod">Shift</button></div>
          <label>Modifier Range: <span>51%</span></label>
          <input type="range" min="0" max="100" value="51" />
        </div>
      </div>
      <div class="input-group">
        <div class="group-title">D-Pad</div>

        <div class="input-grid-directional">
          <div class="input-row"><span>Up</span><button id="ButtonDpadUp">Up</button></div>
          <div class="input-row"><span>Left</span><button id="ButtonDpadLeft">Left</button></div>            
          <div class="input-row"><span>Right</span><button id="ButtonDpadRight">Right</button></div>
          <div class="input-row"><span>Down</span><button id="ButtonDpadDown">Down</button></div>
        </div>
      </div>
    </div>
    <div class="config-center">
      <div class="center-buttons-grid">
        <div class="button-column">
          <div class="input-row"><span>SL</span><button id="ButtonSLLeft">Q</button></div>
          <div class="input-row"><span>SR</span><button id="ButtonSRLeft">E</button></div>
        </div>
        <div class="button-column">
          <div class="input-row"><span>L</span><button id="ButtonL">Q</button></div>
          <div class="input-row"><span>ZL</span><button id="ButtonZL">R</button></div>
        </div>
        <div class="button-column">
          <div class="input-row"><span>Minus</span><button id="ButtonMinus">N</button></div>
          <div class="input-row"><span>Capture</span><button id="ButtonScreenshot"></button></div>
        </div>
        <div class="button-column">
          <div class="input-row"><span>Plus</span><button id="ButtonPlus">M</button></div>
          <div class="input-row"><span>Home</span><button id="ButtonHome"></button></div>
        </div>
        <div class="button-column">
          <div class="input-row"><span>R</span><button id="ButtonR">E</button></div>
          <div class="input-row"><span>ZR</span><button id="ButtonZR">T</button></div>
        </div>
        <div class="button-column">
          <div class="input-row"><span>SL</span><button id="ButtonSLRight">Q</button></div>
          <div class="input-row"><span>SR</span><button id="ButtonSRRight">E</button></div>
        </div>
      </div>
	  <div>     
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-240 -180 480 360" id="ProController">
  <defs>
    <style>
      .controller { stroke: black; stroke-opacity: 0.3; stroke-width: 1;
      .leftGrip, .rightGrip { fill: #c9ced6; stroke: black; stroke-opacity: 0.3; stroke-width: 1; }
      .button .shape { fill: #2c2c2c; stroke: black; stroke-opacity: 0.5; stroke-width: 1; }
      .button .label { fill: white; font-family: Arial, sans-serif; font-weight: bold; }
      .button .symbol { fill: white; }
      .button[data-pressed="1"] .shape { fill: #aa0000; }
      .button[data-setting="1"] .shape { animation: flash 0.5s ease-in-out infinite; }
      .home .outer { fill: #2c2c2c; stroke: black; stroke-opacity: 0.5; stroke-width: 1; }
      .home .inner { fill: none; stroke: white; stroke-width: 1; }
      .home .house { fill: white; }      
      .screenshot .shape { fill: #2c2c2c; stroke: black; stroke-opacity: 0.5; stroke-width: 1; }
      .screenshot .symbol { fill: white; }      
      .plus .shape, .minus .shape { fill: #2c2c2c; stroke: black; stroke-opacity: 0.5; stroke-width: 1; }
      .plus .symbol, .minus .symbol { fill: white; }
      .cube.face { fill:none; stroke:#5aa0ff; stroke-width:1.5 }
      .cube.face.back { stroke-dasharray:3 3; opacity:.6 }
      .cube.edge { stroke:#5aa0ff; stroke-width:1; opacity:.9 }
      .trigger .shape { fill: #e6e6e6; stroke: #222; stroke-width: 1; }
      .trigger .label { fill: #111; }
      .trigger[data-pressed="1"] .shape { fill: #aa0000; }
      .trigger[data-pressed="1"] .label { fill: white; }

      @keyframes flash {
        0%, 100% { fill: #2c2c2c; }
        50% { fill: #aa0000; }
      }
    </style>
  </defs>
