<div class="controller-config">
  <div class="config-header">
    <div class="group" id="ControllerTypeGroup">
      <div class="connect">
        <input type="checkbox" id="ConnectedController">
        <label for="ConnectedController">Connect Controller</label>
      </div>
      <ComboBox id="comboControllerType" />
    </div>
    <div class="group InputDevice">
      <div class="group-title">Input Device</div>
      <ComboBox id="comboDevices" />
    </div>
    <div class="group profile">
      <div class="group-title">Profile</div>
      <select id="profile" style="width: 100%%">
        <option value="">Select Profile</option>
      </select>
	  <button id="profile-save-btn">Save</button>
	  <button id="profile-new-btn">New</button>
	  <button id="profile-delete-btn">Delete</button>
    </div>
  </div>
  <div id="bottom">
    <div id="bottomLeftSpacer"></div>
    <div id="bottomLeft">
      <div class="input-group">
        <div class="group-title">Left Stick</div>

        <div class="input-grid-directional">
          <div class="input-row"><span>Up</span><button id="ButtonLStickUp">W</button></div>
          <div class="input-row"><span>Left</span><button id="ButtonLStickLeft">A</button></div>
          <div class="input-row"><span>Right</span><button id="ButtonLStickRight">D</button></div>
          <div class="input-row"><span>Down</span><button id="ButtonLStickDown">S</button></div>
          <div class="input-row"><span>Pressed</span><button id="ButtonLStick">F</button></div>
          <div class="input-row"><span>Modifier</span><button id="ButtonLStickMod">Shift</button></div>
          <label id="labelLStickDeadzone">Deadzone: <span>0%</span></label>
          <input type="hslider" id="sliderLStickDeadzone" min="0" max="100" value="0" />
          <label id="labelLStickModifierRange">Modifier Range: <span>51%</span></label>
          <input type="hslider" id="sliderLStickModifierRange" min="0" max="100" value="51" />
        </div>
      </div>
      <div class="input-group">
        <div class="group-title">D-Pad</div>

        <div class="input-grid-directional">
          <div class="input-row"><span>Up</span><button id="ButtonDpadUp">Up</button></div>
          <div class="input-row"><span>Left</span><button id="ButtonDpadLeft">Left</button></div>
          <div class="input-row"><span>Right</span><button id="ButtonDpadRight">Right</button></div>
          <div class="input-row"><span>Down</span><button id="ButtonDpadDown">Down</button></div>
        </div>
      </div>
    </div>
    <div class="bottomMiddle">
      <div class="center-buttons-grid">
        <div class="button-column" id="buttonShoulderButtonsSLSRLeft">
          <div class="input-row"><span>SL</span><button id="ButtonSLLeft">Q</button></div>
          <div class="input-row"><span>SR</span><button id="ButtonSRLeft">E</button></div>
        </div>
        <div id="horizontalSpacerShoulderButtonsWidget4" />
        <div class="button-column" id="buttonShoulderButtonsLeft">
          <div class="input-row"><span>L</span><button id="ButtonL">Q</button></div>
          <div class="input-row"><span>ZL</span><button id="ButtonZL">R</button><input type="hslider" id="sliderZLThreshold" min="0" max="100" value="50" /></div>
        </div>
        <div id="horizontalSpacerShoulderButtonsWidget" />
        <div class="button-column" id="buttonMiscButtonsMinusScreenshot">
          <div class="input-row" id="buttonMiscButtonsMinusGroup"><span>Minus</span><button id="ButtonMinus">N</button></div>
          <div class="input-row" id="buttonMiscButtonsScreenshotGroup"><span>Capture</span><button id="ButtonScreenshot"></button></div>
        </div>
        <div class="button-column" id="buttonMiscButtonsPlusHome">
          <div class="input-row"><span>Plus</span><button id="ButtonPlus">M</button></div>
          <div class="input-row"><span>Home</span><button id="ButtonHome"></button></div>
        </div>
        <div id="horizontalSpacerShoulderButtonsWidget3" />
        <div class="button-column" id="buttonShoulderButtonsRight">
          <div class="input-row"><span>R</span><button id="ButtonR">E</button></div>
          <div class="input-row"><span>ZR</span><button id="ButtonZR">T</button><input type="hslider" id="sliderZRThreshold" min="0" max="100" value="50" /></div>
        </div>
        <div id="horizontalSpacerShoulderButtonsWidget2" />
        <div class="button-column" id="buttonShoulderButtonsSLSRRight">
          <div class="input-row"><span>SL</span><button id="ButtonSLRight">Q</button></div>
          <div class="input-row"><span>SR</span><button id="ButtonSRRight">E</button></div>
        </div>
      </div>
	  <div id="controllerGraphics" style="width: 100%%; height: 100%%"></div>
      <div class="center-buttons-motion" id="centerButtonsMotion">
          <div id="horizontalSpacerMotionLeft" />
          <div class="input-row" id="buttonMotionLeftGroup"><span>Motion 1</span><button id="buttonMotionLeft">7</button></div>
          <div class="input-row" id="buttonMotionRightGroup"><span>Motion 2</span><button id="buttonMotionRight">8</button></div>
          <div id="horizontalSpacerMotionRight" />
      </div>
    </div>
    <div id="bottomRightSpacer"></div>
    <div id="bottomRight">
      <div class="input-group">
        <div class="group-title">Face Buttons</div>

        <div class="input-grid-directional">
          <div class="input-row"><span>X</span><button id="ButtonX">V</button></div>
          <div class="input-row"><span>Y</span><button id="ButtonY">Z</button></div>
          <div class="input-row"><span>A</span><button id="ButtonA">C</button></div>
          <div class="input-row"><span>B</span><button id="ButtonB">X</button></div>
        </div>
      </div>
      <div class="input-group">
        <div class="group-title">Right Stick</div>
        <div class="input-grid-directional">
          <div class="input-row"><span>Up</span><button id="ButtonRStickUp">I</button></div>
          <div class="input-row"><span>Left</span><button id="ButtonRStickLeft">J</button></div>
          <div class="input-row"><span>Right</span><button id="ButtonRStickRight">L</button></div>
          <div class="input-row"><span>Down</span><button id="ButtonRStickDown">K</button></div>
          <div class="input-row"><span>Pressed</span><button id="ButtonRStick">G</button></div>
          <div class="input-row"><span>Modifier</span><button id="ButtonRStickMod">&nbsp;</button></div>
          <label id="labelRStickDeadzone">Deadzone: <span>0%</span></label>
          <input type="hslider" id="sliderRStickDeadzone" min="0" max="100" value="0" />
          <label id="labelRStickModifierRange">Modifier Range: <span>51%</span></label>
          <input type="hslider" id="sliderRStickModifierRange" min="0" max="100" value="51" />
        </div>
      </div>
    </div>
  </div>
</div>
