<PageNav target="GeneralContents" id="GeneralTabNav" class="page_tabs">
  <Page label="Game Browser" Name="GameBrowser">
    <div class="input-group">
      <div class="group-title">Game Directories</div>
      <ListBox id="gameDirectoryList" />
      <div class="buttons-container">
        <button id="gameDirectoryAdd">Add</button>
        <button id="gameDirectoryRemove">Remove</button>
      </div>
    </div>
    <div class="input-group">
      <div class="group-title">Game Browser</div>
      <div class="form-row slider-row">
        <div class="left"><label for="myGamesIconSize">My Games Icon Size:</label></div>
        <div class="right"><input type="hslider" min="1" max="4" value="2" id="myGamesIconSize" style="width: 19em" /></div>
      </div>
    </div>
  </Page>
  <Page label="System" Name="System">
    <div class="input-group">
      <div class="group-title">Docked Mode</div>
      <div class="form-row">
        <div class="left"><label for="DockedMode">Docked Mode:</label></div>
        <div class="right"><ComboBox id="DockedMode" tooltip="Selects if the console is in Docked or Handheld mode. Games will change resolution and performance settings. Setting to Handheld can help improve performance on low-end systems." /></div>
      </div>
    </div>
  </Page>
  <Page label="Hotkeys" Name="Hotkeys">
    <div class="input-group hotkeys-page">
      <div class="hotkeys-hint">Double-click a binding to change it. While recording, press Delete to clear the shortcut, or click outside the cell to cancel.</div>
      <table class="hotkeys-table">
        <thead>
          <tr><th>Action</th><th>Hotkey</th></tr>
        </thead>
        <tbody id="HotkeysTableBody">
        </tbody>
      </table>
    </div>
  </Page>
  <Page label="Logging" Name="Logging">
    <div class="input-group">
      <div class="group-title">Logging</div>
      <div class="form-row inputtext-row">
        <div class="left"><label>Log Filter:</label></div>
        <div class="right"><input type="text" id="LogFilter" name="LogFilter" /></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="ShowLogConsole"><label for="ShowLogConsole">Show Log Console</label></div>
      </div>
    </div>
  </Page>
</PageNav>
<div id="GeneralContents" class="page_content" />
