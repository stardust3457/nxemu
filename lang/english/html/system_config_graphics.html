<PageNav target="GraphicsContents" id="GraphicsTabNav" class="page_tabs">
  <Page label="Graphics" Name="Graphics">
    <div class="input-group">
      <div class="group-title">API Settings</div>
      <div class="form-row">
        <div class="left"><label for="GraphicsAPI">API:</label></div>
        <div class="right"><ComboBox id="GraphicsAPI" tooltip="Switches between the available graphics APIs.\nVulkan is recommended in most cases." /></div>
      </div>
      <div class="form-row" id="ShaderBackendRow">
        <div class="left"><label for="ShaderBackend">Shader Backend:</label></div>
        <div class="right"><ComboBox id="ShaderBackend" tooltip="The shader backend to use for the OpenGL renderer.\nGLSL is the fastest in performance and the best in rendering accuracy.\nGLASM is a deprecated NVIDIA-only backend that offers much better shader building performance at the cost of FPS and rendering accuracy.\nSPIR-V compiles the fastest, but yields poor results on most GPU drivers."/></div>
      </div>
      <div class="form-row" id="VulkanDevicesRow">
        <div class="left"><label for="VulkanDevices">Device:</label></div>
        <div class="right"><ComboBox id="VulkanDevices" tooltip="This setting selects the GPU to use with the Vulkan backend."  /></div>
      </div>
    </div>
    <div class="input-group">
      <div class="group-title">Graphics Settings</div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="UseDiskPipelineCache" tooltip="Allows saving shaders to storage for faster loading on following game boots.\nDisabling it is only intended for debugging."><label for="UseDiskPipelineCache">Use disk pipeline cache</label></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="UseAsynchronousGPUEmulation" tooltip="Uses an extra CPU thread for rendering.\nThis option should always remain enabled."><label for="UseAsynchronousGPUEmulation">Use asynchronous GPU emulation</label></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="AstcDecodeMode">ASTC Decoding Method:</label></div>
        <div class="right"><ComboBox id="AstcDecodeMode" tooltip="This option controls how ASTC textures should be decoded.\nCPU: Use the CPU for decoding, slowest but safest method.\nGPU: Use the GPU's compute shaders to decode ASTC textures, recommended for most games and users.\nCPU Asynchronously: Use the CPU to decode ASTC textures as they arrive. Completely eliminates ASTC decoding\nstuttering at the cost of rendering issues while the texture is being decoded." /></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="VSyncMode">VSync Mode:</label></div>
        <div class="right"><ComboBox id="VSyncMode" tooltip="FIFO (VSync) does not drop frames or exhibit tearing but is limited by the screen refresh rate.\nFIFO Relaxed is similar to FIFO but allows tearing as it recovers from a slow down.\nMailbox can have lower latency than FIFO and does not tear but may drop frames.\nImmediate (no synchronization) just presents whatever is available and can exhibit tearing." /></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="NvdecEmulation">NVDEC emulation:</label></div>
        <div class="right"><ComboBox id="NvdecEmulation" tooltip="Specifies how videos should be decoded.\nIt can either use the CPU or the GPU for decoding, or perform no decoding at all (black screen on videos).\nIn most cases, GPU decoding provides the best performance."/></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="FullscreenMode">Fullscreen Mode:</label></div>
        <div class="right"><ComboBox id="FullscreenMode" tooltip="The method used to render the window in fullscreen.\nBorderless offers the best compatibility with the on-screen keyboard that some games request for input.\nExclusive fullscreen may offer better performance and better Freesync/Gsync support." /></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="AspectRatio">Aspect Ratio:</label></div>
        <div class="right"><ComboBox id="AspectRatio" tooltip="Stretches the game to fit the specified aspect ratio.\nSwitch games only support 16:9, so custom game mods are required to get other ratios.\nAlso controls the aspect ratio of captured screenshots."/></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="ResolutionSetup">Resolution:</label></div>
        <div class="right"><ComboBox id="ResolutionSetup" tooltip="Forces the game to render at a different resolution.\nHigher resolutions require much more VRAM and bandwidth.\nOptions lower than 1X can cause rendering issues." /></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="ScalingFilter">Window Adapting Filter:</label></div>
        <div class="right"><ComboBox id="ScalingFilter" /></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="AntiAliasing">Anti-Aliasing Method:</label></div>
        <div class="right"><ComboBox id="AntiAliasing" tooltip="The anti-aliasing method to use.\nSMAA offers the best quality.\nFXAA has a lower performance impact and can produce a better and more stable picture under very low resolutions."/></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="FSPSharpness">FSP Sharpness:</label></div>
        <div class="right"><input type="hslider" id="Volume" min="0" max="100" value="100" id="FSPSharpness" style="width: 19em" /><span id="FSPSharpnessDisplay">100%</span></div>
      </div>
    </div>
  </page>
  <Page label="Advanced" Name="Advanced">
    <div class="input-group">
      <div class="group-title">Advanced Graphics Settings</div>
      <div class="form-row">
        <div class="left"><label for="AccuracyLevel">Accuracy Level:</label></div>
        <div class="right"><ComboBox id="AccuracyLevel" tooltip="GPU emulation accuracy.\nMost games render fine with Normal, but High is still required for some.\nParticles tend to only render correctly with High accuracy.\nExtreme should only be used for debugging.\nThis option can be changed while playing.\nSome games may require booting on high to render properly."/></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="AnisotropicFiltering">Anisotropic Filtering:</label></div>
        <div class="right"><ComboBox id="AnisotropicFiltering" tooltip="Controls the quality of texture rendering at oblique angles.\nIt’s a light setting and safe to set at 16x on most GPUs."/></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="ASTCRecompressionMethod">ASTC Recompression Method:</label></div>
        <div class="right"><ComboBox id="ASTCRecompressionMethod" tooltip="Almost all desktop and laptop dedicated GPUs lack support for ASTC textures, forcing the emulator to decompress to an intermediate format any card supports, RGBA8.\nThis option recompresses RGBA8 to either the BC1 or BC3 format, saving VRAM but negatively affecting image quality." /></div>
      </div>
      <div class="form-row">
        <div class="left"><label for="VRAMUsageMode">VRAM Usage Mode:</label></div>
        <div class="right"><ComboBox id="VRAMUsageMode" tooltip="Selects whether the emulator should prefer to conserve memory or make maximum usage of available video memory for performance. Has no effect on integrated graphics. Aggressive mode may severely impact the performance of other applications such as recording software."/></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="EnableAsynchronousPresentation" tooltip="Slightly improves performance by moving presentation to a separate CPU thread."><label for="EnableAsynchronousPresentation">Enable asynchronous presentation (Vulkan only)</label></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="ForceMaximumClocks" tooltip="Runs work in the background while waiting for graphics commands to keep the GPU from lowering its clock speed."><label for="ForceMaximumClocks">Force maximum clocks (Vulkan only)</label></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="EnableReactiveFlushing"><label for="EnableReactiveFlushing" tooltip="Uses reactive flushing instead of predictive flushing, allowing more accurate memory syncing.">Enable Reactive Flushing</label></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="UseAsynchronousShaderBuilding"><label for="UseAsynchronousShaderBuilding" tooltip="Enables asynchronous shader compilation, which may reduce shader stutter.\nThis feature is experimental.">Use asynchronous shader building (Hack)</label></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="FastGPUTime" tooltip="Enables Fast GPU Time. This option will force most games to run at their highest native resolution."><label for="FastGPUTime">Fast GPU Time (Hack)</label></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="UseVulkanPipelineCache" tooltip="Enables GPU vendor-specific pipeline cache.\nThis option can improve shader loading time significantly in cases where the Vulkan driver does not store pipeline cache files internally."><label for="UseVulkanPipelineCache">Use Vulkan pipeline cache</label></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="SyncToFramerateOfVideoPlayback" tooltip="Run the game at normal speed during video playback, even when the framerate is unlocked."><label for="SyncToFramerateOfVideoPlayback">Sync to framerate of video playback</label></div>
      </div>
      <div class="form-row checkbox-row">
        <div class="checkbox"><input type="checkbox" id="BarrierFeedbackLoops" tooltip="Improves rendering of transparency effects in specific games."><label for="BarrierFeedbackLoops">Barrier feedback loops</label></div>
      </div>
    </div>
  </page>
</PageNav>
<div id="GraphicsContents" class="page_content" />
