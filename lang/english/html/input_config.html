<html window-frame="solid-with-shadow" window-icon="window-icon.png">
  <head>
    <link href="base.css" rel="stylesheet" type="text/css" />
    <link href="config.css" rel="stylesheet" type="text/css" />
    <title>Configure Input</title>
  </head>
  <header>
    <window-caption role=window-caption><img src="window-icon-32.png" /><span>Configure input</span></window-caption>
    <window-buttons>
      <window-button role="window-close"></window-button>
    </window-buttons>

  <style>
html {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: max-content;
  height: max-content;
}

#MainTabNav
{
  flow: horizontal;
}
#MainTabNav Page
{
  white-space: nowrap;
}
.tab-button {
   text-align: center;
   min-width: 2.5rem;
}
.tab-button:visited {
  background: var(--color-config-page);
  border-color: var(--color-config-page-border);
  border-bottom: 1px solid var(--color-config-page);
}

.connect {
  position: absolute;
  top: -0.5rem;
  left: 0.2rem;
  background: var(--color-config-page);
  padding: 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.controller-select
{
  width: 100%%;
}

div.center-buttons-grid
{
  margin: 0 0.4rem;
}

div.button-column,
#horizontalSpacerShoulderButtonsWidget,
#horizontalSpacerShoulderButtonsWidget2,
#horizontalSpacerShoulderButtonsWidget3,
#horizontalSpacerShoulderButtonsWidget4
{
  flow: vertical;
  display: inline-block;
}

.controller-config
{
  background: var(--color-config-page);
  border: 1px solid var(--color-config-page-border);
  width: 100%%;
  height: 100%%;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 0.8rem;
  color: #eff0f1;
  padding: 1em;
}

.controller-config .config-header
{
  flow: horizontal;
  width: fit-content;
}

.controller-config .config-header .group 
{
  position: relative;
  background-color: var(--color-config-page);
  border: 1px solid #55575a;
  padding: 1.2rem 0.5rem 0.5rem 0.5rem;
  margin: 0 0 1rem 0;
}

.controller-config  .group.InputDevice
{
  min-width: 16rem;
  margin-right: 0.4rem;
}

.controller-config  .group.profile
{
  width: 100%%;
  min-width: 32rem;
}

div.center-buttons-grid
{
  flow: horizontal;
  vertical-align: top;
}

#bottom
{
  flow: horizontal;
}

#bottomLeft,
#bottomLeftSpacer,
#bottomRight,
#bottomRightSpacer
{
  width: 13rem;
}

.bottomMiddle
{
  width: *;
  min-width: 36rem;
  min-height: 38rem;
}

#ControllerTypeGroup
{
  flow: horizontal;
  min-width: 11rem;
  margin-right: 0.4rem;
}

#comboControllerType
{
  width: 10.8rem;
}

#ProController,
#Handheld,
#GCController,
#DualJoycons,
#LeftJoycon
{
  width: 100%;
  min-width: 400px;
  min-height: 200px;
  height: auto;
}

.input-row
{
  width: min-content;
}

button
{
  width: min-content;
}

input[type=hslider]
{
  display: block;
  width: 100%%;
  min-width: 0;
}

input[type=hslider] > button.slider 
{ 
  size:4dip; 
  foreground: none; 
  background: #009CF6; 
  border:2dip solid #009CF6;
  border-radius:50%;
  padding: 0px;
  margin: 0px;
}

#horizontalSpacerShoulderButtonsWidget,
#horizontalSpacerShoulderButtonsWidget2,
#horizontalSpacerShoulderButtonsWidget3,
#horizontalSpacerShoulderButtonsWidget4	
{
  width: 100%%;
}

#InputContents
{
  width: 65em;
}
