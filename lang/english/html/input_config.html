<html window-frame="solid-with-shadow" window-icon="window-icon.png">
  <head>
    <link href="base.css" rel="stylesheet" type="text/css" />
    <link href="config.css" rel="stylesheet" type="text/css" />
    <title>Configure Input</title>
  </head>
  <header>
    <window-caption role=window-caption><img src="window-icon-32.png" /><span>Configure input</span></window-caption>
    <window-buttons>
      <window-button role="window-close"></window-button>
    </window-buttons>
  </header>
  <style>
html {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: max-content;
  height: max-content;
}

    #MainTabNav
    {
      flow: horizontal;
    }
    #MainTabNav Page
    {
      white-space: nowrap;
    }
    .tab-button {
       text-align: center;
       min-width: 2.5rem;
    }
    .tab-button:visited {
      background: var(--color-config-page);
      border-color: var(--color-config-page-border);
      border-bottom: 1px solid var(--color-config-page);
    }

	.connect {
		position: absolute;
		top: -0.5rem;
		left: 0.2rem;
		background: var(--color-config-page);
		padding: 0 8px;
		display: flex;
		align-items: center;
		gap: 8px;
		white-space: nowrap;
	}
    .controller-select
    {
      width: 100%%;
    }
button
{
  color: #eff0f1;
  background: #232728;
  border: 1px solid #55575a;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 0.8rem;
  padding: 0.2rem;
  min-width: 5rem;
}

  </style>
<body>
  <div class="InputPage">
    <PageNav id="MainTabNav" target="InputContents">
      <Page contents="input_config_player.html" label="Player 1" Name="Player1" class="tab-button" />
      <Page contents="input_config_player.html" label="Player 2" Name="Player2" class="tab-button" />
      <Page contents="input_config_player.html" label="Player 3" Name="Player3" class="tab-button" />
      <Page contents="input_config_player.html" label="Player 4" Name="Player4" class="tab-button" />
      <Page contents="input_config_player.html" label="Player 5" Name="Player5" class="tab-button" />
      <Page contents="input_config_player.html" label="Player 6" Name="Player6" class="tab-button" />
      <Page contents="input_config_player.html" label="Player 7" Name="Player7" class="tab-button" />
      <Page contents="input_config_player.html" label="Player 8" Name="Player8" class="tab-button" />
    </PageNav>
    <div id="InputContents"/>
  </div>
  <div class="footer">
    <button>OK</button>
    <button>Cancel</button>
  </div>
</body>
</html>
