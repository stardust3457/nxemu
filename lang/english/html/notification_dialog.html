<html window-frame="transparent" window-icon="window-icon.png">
  <head>
    <link href="base.css" rel="stylesheet" type="text/css" />
    <link href="notification_dialog.css" rel="stylesheet" type="text/css" />
    <title>Notification</title>
  </head>
  <body>
    <div class="notification-panel">
      <header>
        <window-caption role="window-caption"><img src="window-icon-32.png" /><span id="NotificationTitle">Notification</span></window-caption>
        <window-buttons>
          <window-button role="window-close"></window-button>
        </window-buttons>
      </header>
      <div class="notification-body">
        <div id="NotificationMessage"></div>
      </div>
      <div class="footer">
        <button id="NotificationYes">Yes</button>
        <button id="NotificationNo" role="window-close">No</button>
        <button id="NotificationOk" role="window-ok">OK</button>
      </div>
    </div>
  </body>
</html>
