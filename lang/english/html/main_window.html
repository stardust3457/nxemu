<html window-frame="solid-with-shadow" window-icon="window-icon.png" window-resizable window-min-width="1000" window-min-height="665">
  <head>
    <link href="base.css" rel="stylesheet" type="text/css">
    <link href="main_window.css" rel="stylesheet" type="text/css">
    <title>NxEmu</title>
  </head>
  <header>
    <window-caption role=window-caption><img src="window-icon-32.png" /><span>NxEmu</span></window-caption>
    <window-buttons>
      <window-button role="window-minimize"></window-button>
      <window-button role="window-maximize"></window-button>
      <window-button role="window-close"></window-button>
    </window-buttons>
  </header>
  <mainmenu id="MainMenu" />
  <div id="MainContents">
    <div id="RomBrowserPanel" class="main-contents-panel">
      <rombrowser />
    </div>
    <div id="LoadingPanel" class="main-contents-panel">
      <div class="loading-container">
        <div class="loading-text"><span id="LoadingStatusText" class="text">Loading</span>
      	  <div class="dot-pulse-container">
            <div class="dot-pulse"></div>
            <div class="dot-pulse"></div>
            <div class="dot-pulse"></div>
      	  </div>
      	</div>
      </div>
    </div>
    <div id="PausePanel" class="main-contents-panel">
      <div class="pause-panel-container">
        <div class="pause-panel-title">Paused</div>
      </div>
    </div>
  </div>
  <div id="StatusBar" ><span id="dockedMode" /><span id="renderer" /><span id="volume" /><div id="StatusText" /></div>
</html>
<popup id="VolumePopup">
    <div>
        <input type="hslider" min="0" max="200" value="100" id="audioVolume" style="width: 19em" />
    </div>
</popup>
